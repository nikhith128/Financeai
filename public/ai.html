<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — FinanceAI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-0:#0a0a0c; --ink-1:#131316; --ink-2:#1b1b1f;
    --line: rgba(255,255,255,0.08);
    --text-hi:#f2efe9; --text-lo:#8c8a86;
    --gold:#d4af7a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink-0); color:var(--text-hi);
    font-family:'Inter', sans-serif; min-height:100vh;
    padding:24px 16px 60px;
  }
  .top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .back{ color:var(--text-lo); text-decoration:none; font-size:14px; }
  h1{ font-family:'Playfair Display', serif; font-size:28px; margin:0 0 6px; }
  .sub{ color:var(--text-lo); font-size:14px; margin-bottom:28px; }

  .card{
    background: linear-gradient(180deg, var(--ink-2), var(--ink-1));
    border:1px solid var(--line); border-radius:16px;
    padding:22px; margin-bottom:20px;
  }
  .card h2{ font-size:15px; margin:0 0 14px; color:var(--gold); text-transform:uppercase; letter-spacing:0.05em; }

  .insight-text{ font-size:15px; line-height:1.7; color:var(--text-hi); }
  .insight-text h3{ font-family:'Playfair Display', serif; font-size:18px; margin:18px 0 8px; color:var(--gold); }
  .insight-text h3:first-child{ margin-top:0; }
  .insight-text ul{ margin:8px 0; padding-left:20px; }
  .insight-text li{ margin-bottom:6px; }
  .insight-text strong{ color:var(--gold); font-weight:600; }
  .placeholder{ color:var(--text-lo); font-size:14px; }

  button{
    background: var(--gold); color:#1a1a1a; border:none;
    padding:12px 20px; border-radius:10px; font-weight:600; font-size:14px;
    cursor:pointer; width:100%;
  }
  button:disabled{ opacity:0.5; }

  .chat-log{ max-height:380px; overflow-y:auto; margin-bottom:14px; display:flex; flex-direction:column; gap:12px; }
  .msg-row{ display:flex; }
  .msg-row.user{ justify-content:flex-end; }
  .msg-row.ai{ justify-content:flex-start; }

  .bubble{
    max-width:82%; font-size:14px; line-height:1.55; padding:10px 14px;
    border-radius:14px;
  }
  .bubble.user{
    background: rgba(255,255,255,0.06);
    border:1px solid var(--line);
    color:var(--text-hi);
    border-radius:14px 14px 4px 14px;
  }
  .bubble.ai{
    background: rgba(212,175,122,0.08);
    border-left:3px solid var(--gold);
    color:var(--text-hi);
    border-radius:0 14px 14px 14px;
  }
  .bubble.ai strong{ color:var(--gold); }
  .bubble.ai ul{ margin:6px 0; padding-left:18px; }

  .chat-input-row{ display:flex; gap:8px; }
  textarea{
    flex:1; background: rgba(0,0,0,0.3); border:1px solid var(--line); color:var(--text-hi);
    border-radius:10px; padding:12px; font-family:'Inter', sans-serif; font-size:14px; resize:none;
  }
  .send-btn{ width:auto; padding:0 20px; }
</style>
</head>
<body>

  <div class="top">
   <nav class="topnav">
  <a href="index.html">Home</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="transactions.html">Transactions</a>
  <a href="budgets.html">Budgets &amp; Goals</a>
  <a href="analytics.html">Analytics</a>
  <a href="/ai.html" class="active">AI Assistant</a>
  <a href="settings.html">Settings</a>
  <a href="javascript:void(0)" onclick="logout()">Log Out</a>
</nav>
  </div>

  <h1>AI Assistant</h1>
  <div class="sub">Ask about your spending, or get an instant summary of your finances.</div>

  <div class="card">
    <h2>Insights</h2>
    <div id="insight-output" class="placeholder">Tap below to generate an AI summary of your spending.</div>
    <br>
    <button id="insight-btn">Generate Insights</button>
  </div>

  <div class="card">
    <h2>Chat</h2>
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-input-row">
      <textarea id="chat-input" rows="2" placeholder="e.g. How much did I spend on food this month?"></textarea>
      <button id="chat-send" class="send-btn">Send</button>
    </div>
  </div>

<script>
  // ---------- tiny markdown renderer (bold, headers, bullets) ----------
  function renderMarkdown(text){
    if(!text) return '';
    let html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // headers: ### Heading  ->  <h3>Heading</h3>
    html = html.replace(/^###\s?(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^##\s?(.+)$/gm, '<h3>$1</h3>');

    // bold: **text** -> <strong>text</strong>
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // bullet lines starting with * or -
    const lines = html.split('\n');
    let out = [];
    let inList = false;
    for(const line of lines){
      const bulletMatch = line.match(/^\s*[\*\-]\s+(.+)$/);
      if(bulletMatch){
        if(!inList){ out.push('<ul>'); inList = true; }
        out.push('<li>' + bulletMatch[1] + '</li>');
      } else {
        if(inList){ out.push('</ul>'); inList = false; }
        if(line.trim() !== '') out.push('<p>' + line + '</p>');
      }
    }
    if(inList) out.push('</ul>');
    return out.join('');
  }

  async function getTransactions(){
    try{
      const res = await fetch('/api/transactions');
      return await res.json();
    }catch(e){ return []; }
  }

  const insightBtn = document.getElementById('insight-btn');
  const insightOutput = document.getElementById('insight-output');
  insightBtn.addEventListener('click', async () => {
    insightBtn.disabled = true;
    insightBtn.textContent = 'Thinking...';
    insightOutput.textContent = 'Analyzing your transactions...';
    insightOutput.classList.remove('placeholder');
    insightOutput.classList.add('insight-text');
    try{
      const transactions = await getTransactions();
      const res = await fetch('/api/ai/insights', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ transactions })
      });
      const data = await res.json();
      insightOutput.innerHTML = renderMarkdown(data.insight || 'No insight returned.');
    }catch(e){
      insightOutput.textContent = 'Something went wrong. Try again.';
    }
    insightBtn.disabled = false;
    insightBtn.textContent = 'Generate Insights';
  });

  const chatLog = document.getElementById('chat-log');
  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');

  function addMsg(text, role){
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    if(role === 'ai'){
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);
    chatLog.appendChild(row);
    chatLog.scrollTop = chatLog.scrollHeight;
    return bubble;
  }

  async function sendChat(){
    const message = chatInput.value.trim();
    if(!message) return;
    addMsg(message, 'user');
    chatInput.value = '';
    chatSend.disabled = true;
    const thinkingBubble = addMsg('Thinking...', 'ai');
    try{
      const transactions = await getTransactions();
      const res = await fetch('/api/ai/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message, transactions })
      });
      const data = await res.json();
      thinkingBubble.innerHTML = renderMarkdown(data.reply || 'No response.');
    }catch(e){
      thinkingBubble.textContent = 'Something went wrong. Try again.';
    }
    chatSend.disabled = false;
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendChat();
    }
  });
</script>

</body>
</html>
